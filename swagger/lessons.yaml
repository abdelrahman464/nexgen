# Lessons endpoints documentation
# Lessons are the core content units within course sections, containing videos, attachments, and quizzes

paths:
  /lessons:
    get:
      tags:
        - Lessons
      summary: Get all lessons (Admin only)
      description: |
        Retrieves a paginated list of all lessons across all courses in the system.
        This is an **admin-only** endpoint for system-wide lesson management.
        
        **Features:**
        - Returns all lessons regardless of course or section
        - Includes populated course information
        - Supports pagination, filtering, and sorting
        - Image and attachment URLs are automatically transformed to full URLs
        
        **Use cases:**
        - Admin dashboard for content management
        - System-wide lesson auditing
        - Content moderation and review
        - Bulk operations planning
        
        **Note:** For course-specific lessons, use `/lessons/courseLessons/:id` or `/lessons/sectionLessons/:id` instead.
      operationId: getAllLessons
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number for pagination (starts at 1)
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Number of lessons to return per page
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          description: Field to sort by (prefix with - for descending). Common values - `order`, `-createdAt`
          schema:
            type: string
            example: "order"
        - name: fields
          in: query
          description: Comma-separated list of fields to include in response
          schema:
            type: string
            example: "title,order,lessonDuration"
      responses:
        "200":
          description: Lessons retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  results:
                    type: integer
                    example: 100
                  paginationResult:
                    $ref: "#/components/schemas/PaginationResult"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lesson"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - only admins can access all lessons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Lessons
      summary: Create a new lesson
      description: |
        Creates a new lesson within a course section. Only the course instructor or an admin can create lessons.
        
        **Authorization:**
        - Admins can create lessons in any course
        - Instructors can only create lessons in their own courses
        
        **File Upload Support:**
        - `image` - Lesson thumbnail/cover image (converted to WebP, stored in `/uploads/lessons/images/`)
        - `attachments` - Up to 10 files (images or PDFs, stored in `/uploads/lessons/attachments/`)
        - `assignmentFile` - Assignment image file (converted to WebP, stored in `/uploads/lessons/assignments/`)
        
        **Video Integration:**
        - `videoUrl` should contain the VdoCipher video ID
        - Video playback is secured with OTP-based authentication
        - User watermarks are automatically applied during playback
        
        **Quiz/Exam Configuration:**
        - Set `hasQuiz: true` to enable lesson quiz
        - Configure exam settings with `examQuestionsNumber` and `examTitle`
        - Analytics tasks can be required via `isRequireAnalytic`
        
        **Process:**
        1. Validates user authorization (instructor/admin check)
        2. Processes uploaded files (images converted to WebP with 95% quality)
        3. Creates the lesson with provided data
        4. Returns the created lesson with full URLs for media
        
        **Use cases:**
        - Adding new content to a course
        - Building course curriculum
        - Instructor content creation workflow
      operationId: createLesson
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - section
                - course
                - videoUrl
                - lessonDuration
              properties:
                title:
                  oneOf:
                    - type: string
                      description: Simple string title
                      example: "Introduction to Variables"
                    - type: object
                      description: Multilingual title
                      properties:
                        ar:
                          type: string
                          example: "مقدمة في المتغيرات"
                        en:
                          type: string
                          example: "Introduction to Variables"
                description:
                  oneOf:
                    - type: string
                    - type: object
                      properties:
                        ar:
                          type: string
                        en:
                          type: string
                section:
                  type: string
                  description: MongoDB ObjectId of the parent section
                  example: "507f1f77bcf86cd799439011"
                course:
                  type: string
                  description: MongoDB ObjectId of the parent course
                  example: "507f1f77bcf86cd799439012"
                videoUrl:
                  type: string
                  description: VdoCipher video ID for the lesson video
                  example: "abc123def456"
                lessonDuration:
                  type: number
                  description: Duration of the lesson in minutes
                  example: 45
                order:
                  type: integer
                  description: Display order within the section (lower numbers appear first)
                  example: 1
                type:
                  type: string
                  enum: [live, recorded]
                  default: recorded
                  description: Lesson type - live session or pre-recorded video
                image:
                  type: string
                  format: binary
                  description: Lesson thumbnail image (JPEG, PNG, WebP - converted to WebP)
                attachments:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Up to 10 attachment files (images or PDFs)
                hasQuiz:
                  type: boolean
                  default: false
                  description: Whether this lesson has an associated quiz
                quizTitle:
                  type: string
                  description: Title of the lesson quiz
                examQuestionsNumber:
                  type: integer
                  description: Number of questions in the lesson exam
                  default: 0
                examTitle:
                  type: string
                  description: Title of the lesson exam
                isRequireAnalytic:
                  type: boolean
                  default: false
                  description: Whether analytics task completion is required to proceed
                assignmentTitle:
                  oneOf:
                    - type: string
                    - type: object
                      properties:
                        ar:
                          type: string
                        en:
                          type: string
                  description: Title of the lesson assignment
                assignmentDescription:
                  oneOf:
                    - type: string
                    - type: object
                      properties:
                        ar:
                          type: string
                        en:
                          type: string
                  description: Description/instructions for the assignment
                assignmentFile:
                  type: string
                  format: binary
                  description: Assignment reference image file
      responses:
        "201":
          description: Lesson created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/Lesson"
        "400":
          description: |
            Bad request - possible causes:
            - Required fields missing (title, section, course, videoUrl, lessonDuration)
            - Invalid file type (only images and PDFs allowed for attachments)
            - File processing error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Not found - possible causes:
            - User is not an instructor
            - Course not found
            - User is not the instructor of the specified course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lessons/courseLessons/{id}:
    get:
      tags:
        - Lessons
      summary: Get all lessons for a course (with progress tracking)
      description: |
        Retrieves all lessons for a specific course with user-specific access control and progress tracking.
        This is the primary endpoint for displaying course content to enrolled students.
        
        **Access Control Logic:**
        - **Admins:** See all lessons with full video URLs
        - **Users:** Video URLs are hidden for lessons they haven't unlocked yet
        
        **Lesson Unlocking System:**
        - First lesson (or lessons without quizzes) are always accessible
        - Subsequent lessons unlock after completing the previous lesson's exam
        - If `isRequireAnalytic` is true, analytics task must also be passed
        
        **Progress Tracking:**
        - Each lesson shows `passedExam` status (true/false)
        - Analytics tasks show `passedAnalyticsTask` status when applicable
        - `canTakeFinalExam` indicates if user has completed all lessons
        
        **Response includes:**
        - Localized lesson content based on Accept-Language header
        - Pagination support for courses with many lessons
        - Progress indicators for each lesson
        - `canTakeFinalExam` flag for course completion status
        
        **Use cases:**
        - Student course player/learning interface
        - Course progress dashboard
        - Lesson navigation sidebar
      operationId: getCourseLessons
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB ObjectId of the course
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Number of lessons per page
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Course lessons retrieved with access control applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: integer
                    description: Number of lessons returned
                    example: 15
                  canTakeFinalExam:
                    type: boolean
                    description: Whether user has completed all lessons and can take the final exam
                    example: false
                  paginationResult:
                    type: object
                    properties:
                      totalCount:
                        type: integer
                        example: 15
                      currentPage:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 50
                      numberOfPages:
                        type: integer
                        example: 1
                      nextPage:
                        type: integer
                        nullable: true
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Lesson"
                        - type: object
                          properties:
                            passedExam:
                              type: boolean
                              description: Whether user has passed this lesson's exam
                            passedAnalyticsTask:
                              type: boolean
                              description: Whether user has completed analytics task (if required)
                            videoUrl:
                              type: string
                              nullable: true
                              description: Video URL (undefined/hidden for locked lessons)
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - user doesn't have access to this course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No lessons found for this course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lessons/sectionLessons/{id}:
    get:
      tags:
        - Lessons
      summary: Get lessons grouped by sections (with progress tracking)
      description: |
        Retrieves all lessons for a course organized by their sections, with user-specific
        access control and progress tracking. This is ideal for displaying a structured
        course curriculum.
        
        **Response Structure:**
        Returns lessons grouped under their respective sections in display order:
        ```json
        {
          "data": [
            {
              "sectionId": "...",
              "section": "Section Title",
              "lessons": [/* lessons in this section */]
            }
          ]
        }
        ```
        
        **Access Control:**
        Same as `/courseLessons/:id` - video URLs are hidden for locked lessons
        
        **Additional Response Fields:**
        - `lastSectionUserStoppedAt` - Section ID where user's progress currently is
        - `passedFinalExam` - Whether user has completed the course
        - `canTakeFinalExam` - Whether all lessons are completed
        
        **Use cases:**
        - Course curriculum page with expandable sections
        - Progress overview by section
        - Course syllabus display
        - Resume learning feature (using `lastSectionUserStoppedAt`)
      operationId: getSectionLessons
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB ObjectId of the course
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Lessons grouped by sections retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  lastSectionUserStoppedAt:
                    type: string
                    nullable: true
                    description: Section ID where user's current progress is (for resume functionality)
                    example: "507f1f77bcf86cd799439022"
                  passedFinalExam:
                    type: boolean
                    description: Whether user has completed and passed the final course exam
                    example: false
                  canTakeFinalExam:
                    type: boolean
                    description: Whether user has completed all lessons and is eligible for final exam
                    example: false
                  data:
                    type: array
                    description: Lessons organized by sections
                    items:
                      type: object
                      properties:
                        sectionId:
                          type: string
                          description: Section MongoDB ObjectId
                          example: "507f1f77bcf86cd799439011"
                        section:
                          type: string
                          description: Localized section title
                          example: "Getting Started"
                        lessons:
                          type: array
                          items:
                            allOf:
                              - $ref: "#/components/schemas/Lesson"
                              - type: object
                                properties:
                                  passedExam:
                                    type: boolean
                                  passedAnalyticsTask:
                                    type: boolean
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - user doesn't have access to this course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lessons/sectionLessons/{id}/public:
    get:
      tags:
        - Lessons
      summary: Get lessons grouped by sections (Public preview)
      description: |
        Retrieves a public preview of all lessons for a course organized by sections.
        This endpoint is used for course previews before enrollment - no authentication required.
        
        **Public vs Authenticated Endpoint:**
        Unlike the authenticated `/sectionLessons/:id` endpoint, this public version:
        - Does NOT hide video URLs (but videos are still protected by VdoCipher)
        - Does NOT include progress tracking fields
        - Does NOT require authentication
        - Shows the full curriculum structure
        
        **Response Structure:**
        ```json
        {
          "data": [
            {
              "section": "Section Title",
              "lessons": [/* lessons with basic info */]
            }
          ]
        }
        ```
        
        **Use cases:**
        - Course landing page curriculum section
        - "What you'll learn" preview
        - Course comparison before purchase
        - Marketing and SEO pages
        
        **Note:** While lesson metadata is visible, actual video playback still requires
        enrollment and OTP authentication through VdoCipher.
      operationId: getSectionLessonsPublic
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB ObjectId of the course
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Public lesson preview retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Lessons organized by sections (public view)
                    items:
                      type: object
                      properties:
                        section:
                          type: string
                          description: Localized section title
                          example: "Introduction"
                        lessons:
                          type: array
                          items:
                            $ref: "#/components/schemas/Lesson"

  /lessons/{id}:
    get:
      tags:
        - Lessons
      summary: Get lesson by ID (with video playback data)
      description: |
        Retrieves detailed information about a specific lesson, including secure video playback data.
        
        **Video Playback Security:**
        For non-admin users, this endpoint generates a secure OTP (One-Time Password) for VdoCipher
        video playback with the following security features:
        - OTP valid for 60 minutes
        - User-specific watermark overlay showing user ID/email
        - Watermark configuration: semi-transparent blue text, appearing every 3 seconds
        
        **Response includes:**
        - Full lesson details with localized content
        - `videoData` object containing OTP and playback token (for non-admins)
        - Translation fields for multilingual support
        
        **Access Control:**
        - Users must have access to the course (enrollment check via `checkLessonAccess`)
        - Admins bypass video OTP generation and access checks
        
        **Use cases:**
        - Lesson player page
        - Video playback initialization
        - Lesson content viewing
        
        **Note:** The `videoData` object should be used with VdoCipher player SDK to initialize playback.
      operationId: getLessonById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB ObjectId of the lesson
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Lesson details retrieved with video playback data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      lesson:
                        allOf:
                          - $ref: "#/components/schemas/Lesson"
                          - type: object
                            properties:
                              translationTitle:
                                type: object
                                description: Original title object with all translations
                                properties:
                                  ar:
                                    type: string
                                  en:
                                    type: string
                              translationDescription:
                                type: object
                                description: Original description object with all translations
                                properties:
                                  ar:
                                    type: string
                                  en:
                                    type: string
                      videoData:
                        type: object
                        nullable: true
                        description: VdoCipher OTP data for video playback (null for admins)
                        properties:
                          otp:
                            type: string
                            description: One-time password for video playback
                            example: "20160313versASE323ddb249fbcaf2a589401b"
                          playbackInfo:
                            type: string
                            description: Encoded playback information
                            example: "eyJ2aWRlb0lkIjoiMTIzNDU2Nzg5MCJ9"
        "400":
          description: Invalid lesson ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - user doesn't have access to this lesson's course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lesson not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Lessons
      summary: Update a lesson
      description: |
        Updates an existing lesson's information. Only the course instructor or an admin can update lessons.
        
        **Authorization:**
        - Admins can update any lesson
        - Instructors can only update lessons in their own courses
        
        **File Upload Support:**
        Same as create - supports `image`, `attachments` (up to 10), and `assignmentFile`.
        New uploads replace existing files.
        
        **Partial Updates:**
        - Only send fields you want to change
        - Omitted fields retain their current values
        - To clear a field, explicitly set it to null or empty
        
        **Notes:**
        - Changing `section` moves the lesson to a different section
        - Changing `order` affects lesson sequencing
        - Video URL changes take effect immediately for new playback sessions
        
        **Use cases:**
        - Updating lesson content or metadata
        - Replacing video with updated version
        - Adding/updating attachments
        - Fixing typos or improving descriptions
      operationId: updateLesson
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB ObjectId of the lesson to update
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  oneOf:
                    - type: string
                    - type: object
                      properties:
                        ar:
                          type: string
                        en:
                          type: string
                description:
                  oneOf:
                    - type: string
                    - type: object
                      properties:
                        ar:
                          type: string
                        en:
                          type: string
                section:
                  type: string
                  description: Move lesson to different section (Section ID)
                videoUrl:
                  type: string
                  description: New VdoCipher video ID
                lessonDuration:
                  type: number
                  description: Updated duration in minutes
                order:
                  type: integer
                  description: New display order
                type:
                  type: string
                  enum: [live, recorded]
                image:
                  type: string
                  format: binary
                attachments:
                  type: array
                  items:
                    type: string
                    format: binary
                hasQuiz:
                  type: boolean
                quizTitle:
                  type: string
                examQuestionsNumber:
                  type: integer
                examTitle:
                  type: string
                isRequireAnalytic:
                  type: boolean
                assignmentTitle:
                  oneOf:
                    - type: string
                    - type: object
                      properties:
                        ar:
                          type: string
                        en:
                          type: string
                assignmentDescription:
                  oneOf:
                    - type: string
                    - type: object
                      properties:
                        ar:
                          type: string
                        en:
                          type: string
                assignmentFile:
                  type: string
                  format: binary
      responses:
        "200":
          description: Lesson updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/Lesson"
        "400":
          description: Validation error or invalid file type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Not found - possible causes:
            - Lesson not found
            - User is not an instructor
            - Course not found
            - User is not the instructor of this course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Lessons
      summary: Delete a lesson
      description: |
        Permanently deletes a lesson from a course. Only the course instructor or an admin can delete lessons.
        
        **Authorization:**
        - Admins can delete any lesson
        - Instructors can only delete lessons in their own courses
        
        **Deletion Safeguards:**
        The deletion will be **blocked** if either condition exists:
        1. **Exam exists:** There is an exam associated with this lesson
        2. **Student progress exists:** Students have taken the lesson's exam
        
        **Force Delete Option:**
        Add `?forceDelete=true` query parameter to:
        - Delete associated exams
        - Remove lesson from all student progress records
        - Then delete the lesson itself
        
        **Process (with forceDelete):**
        1. Validates lesson exists and user has permission
        2. Checks for associated exams and progress
        3. If blocked and forceDelete=true:
           - Deletes all exams for this lesson
           - Removes lesson from all CourseProgress records
        4. Deletes the lesson
        5. All operations run in a MongoDB transaction for data integrity
        
        **Warning:**
        - This action is irreversible
        - Force delete permanently removes student exam records
        - Consider the impact on student progress before force deleting
        
        **Use cases:**
        - Removing outdated content
        - Course restructuring
        - Cleaning up draft courses
      operationId: deleteLesson
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB ObjectId of the lesson to delete
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
        - name: forceDelete
          in: query
          description: |
            Set to `true` to force deletion even if exams or student progress exist.
            This will delete associated exams and remove from student progress records.
          schema:
            type: boolean
            default: false
      responses:
        "204":
          description: Lesson deleted successfully (no content returned)
        "400":
          description: |
            Cannot delete lesson - one of the following conditions exist:
            - There is an exam associated with this lesson
            - Students have taken the exam for this lesson
            
            Use `?forceDelete=true` to override and delete anyway.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "There is an exam belongs to this lesson\nThere are students take exam of this lesson"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Not found - possible causes:
            - Lesson not found
            - User is not an instructor
            - Course not found
            - User is not the instructor of this course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error during lesson deletion transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    Lesson:
      type: object
      description: |
        A lesson represents a single learning unit within a course section.
        Contains video content, optional attachments, quiz configuration, and assignment details.
      properties:
        _id:
          type: string
          description: Unique MongoDB ObjectId identifier
          example: "507f1f77bcf86cd799439011"
        title:
          oneOf:
            - type: string
              description: Localized title (based on Accept-Language header)
              example: "Introduction to Variables"
            - type: object
              description: Multilingual title object
              properties:
                ar:
                  type: string
                  example: "مقدمة في المتغيرات"
                en:
                  type: string
                  example: "Introduction to Variables"
        description:
          oneOf:
            - type: string
              description: Localized description
            - type: object
              properties:
                ar:
                  type: string
                en:
                  type: string
        section:
          type: string
          description: Parent section MongoDB ObjectId
          example: "507f1f77bcf86cd799439012"
        course:
          oneOf:
            - type: string
              description: Course ID (when not populated)
            - type: object
              description: Populated course object (partial)
              properties:
                _id:
                  type: string
                title:
                  type: object
        type:
          type: string
          enum: [live, recorded]
          default: recorded
          description: Whether the lesson is a live session or pre-recorded video
        image:
          type: string
          nullable: true
          description: Full URL to lesson thumbnail image
          example: "https://api.example.com/lessons/images/lesson-abc123.webp"
        videoUrl:
          type: string
          description: |
            VdoCipher video ID (may be hidden for locked lessons in progress-aware endpoints)
          example: "abc123def456"
        attachments:
          type: array
          description: Full URLs to downloadable attachments (PDFs, images)
          items:
            type: string
          example:
            - "https://api.example.com/lessons/attachments/file1.pdf"
            - "https://api.example.com/lessons/attachments/file2.webp"
        order:
          type: integer
          description: Display order within the section (lower numbers appear first)
          example: 1
        lessonDuration:
          type: number
          description: Lesson duration in minutes
          example: 45
        hasQuiz:
          type: boolean
          default: false
          description: Whether this lesson has an associated quiz
        quizTitle:
          type: string
          nullable: true
          description: Title of the lesson quiz
        examQuestionsNumber:
          type: integer
          default: 0
          description: Number of questions in the lesson exam
        examTitle:
          type: string
          nullable: true
          description: Title of the lesson exam
        isRequireAnalytic:
          type: boolean
          default: false
          description: Whether analytics task completion is required to unlock next lesson
        assignmentTitle:
          oneOf:
            - type: string
            - type: object
              properties:
                ar:
                  type: string
                en:
                  type: string
          nullable: true
          description: Assignment title
        assignmentDescription:
          oneOf:
            - type: string
            - type: object
              properties:
                ar:
                  type: string
                en:
                  type: string
          nullable: true
          description: Assignment instructions
        assignmentFile:
          type: string
          nullable: true
          description: Full URL to assignment reference image
          example: "https://api.example.com/lessons/assignments/assignment-xyz.webp"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the lesson was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the lesson was last updated

    PaginationResult:
      type: object
      description: Pagination metadata for list responses
      properties:
        currentPage:
          type: integer
          example: 1
        numberOfPages:
          type: integer
          example: 5
        limit:
          type: integer
          example: 10
        totalCount:
          type: integer
          example: 50
        next:
          type: integer
          nullable: true
          description: Next page number (null if on last page)
        prev:
          type: integer
          nullable: true
          description: Previous page number (null if on first page)

    ErrorResponse:
      type: object
      description: Standard error response format
      properties:
        status:
          type: string
          example: "error"
        message:
          type: string
          description: Human-readable error message
          example: "Lesson not found"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the login endpoint

