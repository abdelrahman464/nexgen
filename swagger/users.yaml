# Users endpoints documentation

paths:
  /users/Instructors:
    get:
      tags:
        - Users
      summary: Get all instructors (Public)
      description: Get list of all instructors (no authentication required)
      operationId: getInstructors
      responses:
        "200":
          description: Instructors retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  results:
                    type: integer
                    example: 10
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"

  /users/adminAndInstructor:
    get:
      tags:
        - Users
      summary: Get admins and instructors
      description: Get list of admin and instructor users
      operationId: getAdminAndInstructor
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"

  /users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Get list of all users (admin only)
      operationId: getUsers
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          schema:
            type: integer
            example: 10
        - name: sort
          in: query
          schema:
            type: string
            example: "-createdAt"
      responses:
        "200":
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  results:
                    type: integer
                    example: 100
                  pagination:
                    type: object
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
    post:
      tags:
        - Users
      summary: Create user
      description: Create a new user (admin only)
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: "John Doe"
                email:
                  type: string
                  format: email
                  example: "john@example.com"
                password:
                  type: string
                  format: password
                  example: "SecurePass123!"
                role:
                  type: string
                  enum: [user, admin]
                  example: "user"
                profileImg:
                  type: string
                  format: binary
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Get specific user details
      operationId: getUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: User retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/User"
    put:
      tags:
        - Users
      summary: Update user
      description: Update user information (admin only)
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [user, admin]
                profileImg:
                  type: string
                  format: binary
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/User"
    delete:
      tags:
        - Users
      summary: Delete user
      description: Delete a user (admin only)
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "204":
          description: User deleted successfully

  /users/changeMyPassword:
    put:
      tags:
        - Users
      summary: Change my password
      description: Change password for logged-in user
      operationId: changeMyPassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - password
              properties:
                currentPassword:
                  type: string
                  format: password
                  example: "OldPass123!"
                password:
                  type: string
                  format: password
                  example: "NewPass123!"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/changeMyData:
    put:
      tags:
        - Users
      summary: Update my data
      description: Update logged-in user's information
      operationId: changeMyData
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                country:
                  type: string
                profileImg:
                  type: string
                  format: binary
                coverImg:
                  type: string
                  format: binary
      responses:
        "200":
          description: Data updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/User"

  /users/changePassword/{id}:
    put:
      tags:
        - Users
      summary: Change user password (Admin)
      description: Change password for any user (admin only)
      operationId: changeUserPassword
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  format: password
                  example: "NewPass123!"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/active/{id}:
    put:
      tags:
        - Users
      summary: Activate user
      description: Activate a user account
      operationId: activeUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: User activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      tags:
        - Users
      summary: Deactivate user
      description: Deactivate a user account
      operationId: unActiveUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/userData:
    get:
      tags:
        - Users
      summary: Get user data
      description: Get detailed user data (admin only)
      operationId: getUserData
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: User data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/User"

  /users/follow/{id}:
    post:
      tags:
        - Users
      summary: Follow user
      description: Follow another user
      operationId: followUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: User followed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      tags:
        - Users
      summary: Unfollow user
      description: Unfollow a user
      operationId: unFollowUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: User unfollowed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/follow/followersAndFollowing:
    get:
      tags:
        - Users
      summary: Get my followers and following
      description: Get list of followers and users being followed by logged-in user
      operationId: getMyFollowersAndFollowing
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Followers and following retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  followers:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  following:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"

  /users/instructors/withBelongings:
    get:
      tags:
        - Users
      summary: Get all instructors with belongings
      description: Get all instructors with their courses, packages, etc. (admin only)
      operationId: getAllInstructorsWithBelongings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Instructors retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        instructor:
                          $ref: "#/components/schemas/User"
                        courses:
                          type: array
                        packages:
                          type: array

components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        role:
          type: string
          enum: [user, admin]
          example: "user"
        profileImg:
          type: string
          example: "https://example.com/profile.jpg"
        coverImg:
          type: string
          example: "https://example.com/cover.jpg"
        isInstructor:
          type: boolean
          example: false
        isMarketer:
          type: boolean
          example: false
        active:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
