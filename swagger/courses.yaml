            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: User's review retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Review"

  /courses/{courseId}/reviews/{id}:
    get:
      tags:
        - Course Reviews
      summary: Get a specific review
      description: Retrieves a single review by its ID.
      operationId: getCourseReviewById
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Review ID
          schema:
            type: string
      responses:
        "200":
          description: Review retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/Review"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Course Reviews
      summary: Update a review
      description: |
        Updates an existing review. Only the review author can update their own review.
        
        **Notes:**
        - Only users with 'user' role can update reviews
        - Can update rating and/or review text
      operationId: updateCourseReview
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Review ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: number
                  minimum: 1
                  maximum: 5
                review:
                  type: string
      responses:
        "200":
          description: Review updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/Review"
    delete:
      tags:
        - Course Reviews
      summary: Delete a review
      description: |
        Deletes a review. Can be performed by the review author or an admin.
        
        **Authorization:**
        - Users can delete their own reviews
        - Admins can delete any review
      operationId: deleteCourseReview
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Review ID
          schema:
            type: string
      responses:
        "204":
          description: Review deleted successfully
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

