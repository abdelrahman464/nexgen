components:
  schemas:
    Course:
      type: object
      description: Course entity representing an educational course in the system
      properties:
        _id:
          type: string
          description: Unique MongoDB ObjectId identifier
          example: "507f1f77bcf86cd799439011"
        title:
          type: object
          description: Course title with multilingual support
          properties:
            ar:
              type: string
              example: "مقدمة في جافاسكريبت"
            en:
              type: string
              example: "Introduction to JavaScript"
        description:
          type: object
          description: Detailed course description with multilingual support
          properties:
            ar:
              type: string
              example: "تعلم أساسيات البرمجة بجافاسكريبت من الصفر"
            en:
              type: string
              example: "Learn the basics of JavaScript programming from scratch"
        price:
          type: number
          description: Course price in the system's default currency
          example: 99.99
        instructor:
          oneOf:
            - type: string
              description: Instructor User ID (when not populated)
            - type: object
              description: Populated instructor object
              properties:
                _id:
                  type: string
                name:
                  type: string
                email:
                  type: string
                profileImg:
                  type: string
          example: "507f1f77bcf86cd799439012"
        category:
          oneOf:
            - type: string
              description: Category ID (when not populated)
            - type: object
              description: Populated category object
              properties:
                _id:
                  type: string
                title:
                  type: object
          example: "507f1f77bcf86cd799439013"
        image:
          type: string
          description: Course cover image filename (stored in /uploads/courses/)
          example: "course-abc123-1234567890.webp"
        status:
          type: string
          description: Course visibility and availability status
          enum: [draft, active, archived]
          default: draft
          example: "active"
        instructorPercentage:
          type: number
          nullable: true
          description: Revenue sharing percentage for the instructor (0-100)
          example: 70
        highlights:
          type: array
          description: Key learning points or features of the course
          items:
            type: string
          example: ["Learn fundamentals", "Build real projects", "Get certified"]
        accessibleCourses:
          type: array
          description: List of course IDs that grant access to this course
          items:
            type: string
        reviews:
          type: array
          description: Course reviews (populated on detail requests)
          items:
            $ref: "#/components/schemas/Review"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the course was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the course was last updated

    CourseDetails:
      allOf:
        - $ref: "#/components/schemas/Course"
        - type: object
          description: Extended course information including sections and lessons
          properties:
            sections:
              type: array
              description: Course curriculum organized by sections
              items:
                type: object
                properties:
                  _id:
                    type: string
                  title:
                    type: object
                    properties:
                      ar:
                        type: string
                      en:
                        type: string
                  order:
                    type: integer
                  lessons:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lesson"

    Lesson:
      type: object
      description: Individual lesson within a course section
      properties:
        _id:
          type: string
        title:
          type: object
          properties:
            ar:
              type: string
            en:
              type: string
        description:
          type: object
          properties:
            ar:
              type: string
            en:
              type: string
        course:
          type: string
          description: Parent course ID
        section:
          type: string
          description: Parent section ID
        order:
          type: integer
          description: Display order within the section
        lessonDuration:
          type: number
          description: Duration in minutes
        files:
          type: array
          description: Attached files (videos, documents, etc.)
          items:
            type: string

    Review:
      type: object
      description: User review for a course
      properties:
        _id:
          type: string
        user:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
            profileImg:
              type: string
        course:
          type: string
        rating:
          type: number
          minimum: 1
          maximum: 5
          description: Star rating (1-5)
        review:
          type: string
          description: Text feedback
        reply:
          type: string
          description: Admin/instructor response to the review
        createdAt:
          type: string
          format: date-time

    PaginationResult:
      type: object
      description: Pagination metadata for list responses
      properties:
        currentPage:
          type: integer
          example: 1
        numberOfPages:
          type: integer
          example: 5
        limit:
          type: integer
          example: 10
        next:
          type: integer
          nullable: true
          description: Next page number (null if on last page)
        prev:
          type: integer
          nullable: true
          description: Previous page number (null if on first page)

    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "Operation completed successfully"

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: "error"
        message:
          type: string
          example: "Error message describing what went wrong"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint
