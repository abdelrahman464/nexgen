        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - only admins can reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

