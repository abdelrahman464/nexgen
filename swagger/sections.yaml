# Sections endpoints documentation
# Sections are organizational containers within courses that group related lessons together

paths:
  /sections:
    get:
      tags:
        - Sections
      summary: Get all sections
      description: |
        Retrieves a paginated list of all sections across all courses in the system.
        
        **Features:**
        - Returns sections with populated course information (title only)
        - Supports pagination for large datasets
        - Sorted by creation date by default
        
        **Response includes:**
        - Section ID, title, order, and timestamps
        - Associated course title (without accessibleCourses and category to reduce payload)
        
        **Use cases:**
        - Admin dashboard for section management
        - System-wide section overview
        - Content management and auditing
        
        **Note:** For getting sections of a specific course, use `GET /sections/:courseId/course` instead.
      operationId: getAllSections
      parameters:
        - name: page
          in: query
          description: Page number for pagination (starts at 1)
          schema:
            type: integer
            default: 1
            example: 1
        - name: limit
          in: query
          description: Number of sections to return per page
          schema:
            type: integer
            default: 10
            example: 10
        - name: sort
          in: query
          description: Field to sort by (prefix with - for descending order). Common values - `order`, `-createdAt`, `title`
          schema:
            type: string
            example: "order"
      responses:
        "200":
          description: Sections retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  results:
                    type: integer
                    description: Total number of sections
                    example: 25
                  paginationResult:
                    $ref: "#/components/schemas/PaginationResult"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Section"
    post:
      tags:
        - Sections
      summary: Create a new section
      description: |
        Creates a new section within a course. Only the course instructor or an admin can create sections.
        
        **Authorization:**
        - Admins can create sections in any course
        - Instructors can only create sections in their own courses
        
        **Validation:**
        - Title is required and must be at least 3 characters
        - Course ID is required and must reference an existing course
        - Order is optional but recommended for proper display sequencing
        
        **Process:**
        1. Validates the request data (title length, course existence)
        2. Verifies the user is the course instructor or an admin
        3. Creates the section with the provided data
        4. Returns the newly created section
        
        **Use cases:**
        - Organizing course content into logical groups
        - Creating curriculum structure for new courses
        - Adding new modules to existing courses
        
        **Best practices:**
        - Set meaningful order values to control section display sequence
        - Use descriptive titles that reflect the section's content
        - Plan the course structure before creating multiple sections
      operationId: createSection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - course
              properties:
                title:
                  oneOf:
                    - type: string
                      description: Simple string title
                      example: "Getting Started"
                    - type: object
                      description: Multilingual title object
                      properties:
                        ar:
                          type: string
                          example: "البداية"
                        en:
                          type: string
                          example: "Getting Started"
                course:
                  type: string
                  description: MongoDB ObjectId of the parent course
                  example: "507f1f77bcf86cd799439011"
                order:
                  type: integer
                  description: |
                    Display order of the section within the course.
                    Lower numbers appear first. If not provided, the section will be added at the end.
                  example: 1
      responses:
        "201":
          description: Section created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/Section"
        "400":
          description: |
            Bad request - possible causes:
            - Title is missing or too short (minimum 3 characters)
            - Course ID is missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Not found - possible causes:
            - User is not an instructor
            - Course not found
            - User is not the instructor of the specified course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sections/{courseId}/course:
    get:
      tags:
        - Sections
      summary: Get sections by course ID
      description: |
        Retrieves all sections belonging to a specific course, typically used to display
        the course curriculum structure.
        
        **Features:**
        - Returns only sections for the specified course
        - Includes populated course information (title)
        - Supports pagination and sorting
        - Ideal for building course curriculum displays
        
        **Use cases:**
        - Course detail page curriculum section
        - Course editor section list
        - Student course navigation sidebar
        - Course preview before enrollment
        
        **Notes:**
        - Sections are typically displayed sorted by their `order` field
        - Use in combination with lesson endpoints to build full curriculum views
      operationId: getSectionsByCourse
      parameters:
        - name: courseId
          in: path
          required: true
          description: MongoDB ObjectId of the course to get sections for
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Number of sections per page
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          description: Sort field (use `order` for curriculum sequence)
          schema:
            type: string
            example: "order"
      responses:
        "200":
          description: Course sections retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  results:
                    type: integer
                    description: Number of sections in this course
                    example: 5
                  paginationResult:
                    $ref: "#/components/schemas/PaginationResult"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Section"
        "400":
          description: Invalid course ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sections/{id}:
    get:
      tags:
        - Sections
      summary: Get section by ID
      description: |
        Retrieves detailed information about a specific section by its unique identifier.
        
        **Response includes:**
        - Section title (localized based on Accept-Language header)
        - Associated course reference
        - Display order
        - Creation and update timestamps
        
        **Use cases:**
        - Section detail view
        - Section editing form data population
        - Verifying section existence before operations
      operationId: getSectionById
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB ObjectId of the section
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Section retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/Section"
        "400":
          description: Invalid section ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Section not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Sections
      summary: Update a section
      description: |
        Updates an existing section's information. Only the course instructor or an admin can update sections.
        
        **Authorization:**
        - Admins can update any section
        - Instructors can only update sections in their own courses
        
        **Updatable fields:**
        - `title` - Section name (supports multilingual object or simple string)
        - `order` - Display position within the course
        
        **Process:**
        1. Validates the section exists
        2. Verifies the user is the course instructor or an admin
        3. Updates only the provided fields (partial update supported)
        4. Returns the updated section
        
        **Use cases:**
        - Renaming a section
        - Reordering sections within a course
        - Updating section metadata
        
        **Notes:**
        - Course assignment cannot be changed after creation
        - Partial updates are supported (only send fields you want to change)
      operationId: updateSection
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB ObjectId of the section to update
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  oneOf:
                    - type: string
                      example: "Advanced Topics"
                    - type: object
                      properties:
                        ar:
                          type: string
                          example: "مواضيع متقدمة"
                        en:
                          type: string
                          example: "Advanced Topics"
                order:
                  type: integer
                  description: New display order for the section
                  example: 2
      responses:
        "200":
          description: Section updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/Section"
        "400":
          description: Validation error (e.g., title too short)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Not found - possible causes:
            - Section not found
            - User is not an instructor
            - Course not found
            - User is not the instructor of this course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Sections
      summary: Delete a section
      description: |
        Permanently deletes a section from a course. Only the course instructor or an admin can delete sections.
        
        **Authorization:**
        - Admins can delete any section
        - Instructors can only delete sections in their own courses
        
        **Important Restriction:**
        - **Cannot delete sections that contain lessons.** You must first delete or move all lessons 
          within the section before deleting it. This prevents accidental loss of course content.
        
        **Process:**
        1. Checks if the section contains any lessons
        2. If lessons exist, returns an error (400)
        3. Verifies the user is the course instructor or an admin
        4. Deletes the section
        
        **Use cases:**
        - Removing unused or empty sections
        - Course restructuring (after moving content)
        - Cleaning up draft courses
        
        **Warning:**
        - This action is irreversible
        - Ensure all lessons have been moved or deleted first
      operationId: deleteSection
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB ObjectId of the section to delete
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "204":
          description: Section deleted successfully (no content returned)
        "400":
          description: Cannot delete section that has lessons - move or delete lessons first
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "You can't delete section that has lessons"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Not found - possible causes:
            - Section not found
            - User is not an instructor
            - Course not found
            - User is not the instructor of this course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sections/update-sections-and-lessons:
    put:
      tags:
        - Sections
      summary: Bulk update section and lesson ordering
      description: |
        Performs a bulk update operation to reorder multiple sections and their lessons in a single request.
        This is an **admin-only** endpoint designed for efficient curriculum reorganization.
        
        **Purpose:**
        This endpoint allows administrators to update the display order of multiple sections
        and lessons simultaneously, which is essential for:
        - Drag-and-drop curriculum editors
        - Bulk reordering operations
        - Course structure reorganization
        
        **How it works:**
        1. Receives an array of sections with their new order values
        2. Each section can optionally include lessons with their new order values
        3. Uses MongoDB bulk write operations for efficient database updates
        4. All updates are performed in parallel for maximum performance
        
        **Request format:**
        ```json
        {
          "sections": [
            {
              "sectionId": "section_id_1",
              "order": 1,
              "lessons": [
                { "lessonId": "lesson_id_1", "order": 1 },
                { "lessonId": "lesson_id_2", "order": 2 }
              ]
            },
            {
              "sectionId": "section_id_2",
              "order": 2,
              "lessons": [
                { "lessonId": "lesson_id_3", "order": 1 }
              ]
            }
          ]
        }
        ```
        
        **Use cases:**
        - Course curriculum drag-and-drop interface
        - Batch reordering after content restructuring
        - Import/sync operations that need to set multiple orders
        
        **Performance:**
        - Uses MongoDB `bulkWrite` for optimal performance
        - Section and lesson updates run in parallel
        - Suitable for large courses with many sections and lessons
        
        **Notes:**
        - Only updates the `order` field; other fields are not modified
        - Invalid IDs are silently ignored (no error thrown)
        - The `lessons` array within each section is optional
      operationId: updateSectionsAndLessons
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sections
              properties:
                sections:
                  type: array
                  description: Array of sections with their new order values and optional nested lesson orders
                  items:
                    type: object
                    required:
                      - sectionId
                      - order
                    properties:
                      sectionId:
                        type: string
                        description: MongoDB ObjectId of the section
                        example: "507f1f77bcf86cd799439011"
                      order:
                        type: integer
                        description: New display order for this section
                        example: 1
                      lessons:
                        type: array
                        description: Optional array of lessons within this section to reorder
                        items:
                          type: object
                          required:
                            - lessonId
                            - order
                          properties:
                            lessonId:
                              type: string
                              description: MongoDB ObjectId of the lesson
                              example: "507f1f77bcf86cd799439012"
                            order:
                              type: integer
                              description: New display order for this lesson within the section
                              example: 1
            example:
              sections:
                - sectionId: "507f1f77bcf86cd799439011"
                  order: 1
                  lessons:
                    - lessonId: "507f1f77bcf86cd799439021"
                      order: 1
                    - lessonId: "507f1f77bcf86cd799439022"
                      order: 2
                - sectionId: "507f1f77bcf86cd799439012"
                  order: 2
                  lessons:
                    - lessonId: "507f1f77bcf86cd799439023"
                      order: 1
      responses:
        "200":
          description: Sections and lessons updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Sections and lessons updated successfully"
        "400":
          description: Bad request - sections must be an array
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "sections must be an array"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - only admins can perform bulk updates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error during bulk update operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to update sections or lessons"

components:
  schemas:
    Section:
      type: object
      description: |
        A section represents a logical grouping of lessons within a course.
        Sections help organize course content into manageable chunks and provide
        a clear curriculum structure for students.
      properties:
        _id:
          type: string
          description: Unique MongoDB ObjectId identifier for the section
          example: "507f1f77bcf86cd799439011"
        title:
          oneOf:
            - type: string
              description: Section title (when returned as localized string)
              example: "Introduction to the Course"
            - type: object
              description: Multilingual section title
              properties:
                ar:
                  type: string
                  example: "مقدمة الدورة"
                en:
                  type: string
                  example: "Introduction to the Course"
        course:
          oneOf:
            - type: string
              description: Course ID reference (when not populated)
              example: "507f1f77bcf86cd799439012"
            - type: object
              description: Populated course object (partial)
              properties:
                _id:
                  type: string
                  example: "507f1f77bcf86cd799439012"
                title:
                  type: object
                  properties:
                    ar:
                      type: string
                    en:
                      type: string
        order:
          type: integer
          description: |
            Display order of the section within the course.
            Lower numbers appear first in the curriculum.
          example: 1
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the section was created
          example: "2024-01-15T10:30:00.000Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the section was last updated
          example: "2024-01-16T14:45:00.000Z"

    PaginationResult:
      type: object
      description: Pagination metadata for list responses
      properties:
        currentPage:
          type: integer
          description: Current page number
          example: 1
        numberOfPages:
          type: integer
          description: Total number of pages available
          example: 5
        limit:
          type: integer
          description: Number of items per page
          example: 10
        next:
          type: integer
          nullable: true
          description: Next page number (null if on last page)
          example: 2
        prev:
          type: integer
          nullable: true
          description: Previous page number (null if on first page)
          example: null

    ErrorResponse:
      type: object
      description: Standard error response format
      properties:
        status:
          type: string
          example: "error"
        message:
          type: string
          description: Human-readable error message
          example: "Section not found"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the login endpoint

