  /orders/plisio/payment/callback:
    post:
      tags:
        - Orders
      summary: Plisio payment callback
      description: Webhook endpoint for Plisio payment callbacks
      operationId: plisioPaymentCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Callback processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"

  /orders/lahza/payment/callback:
    get:
      tags:
        - Orders
      summary: Lahza payment callback
      description: Callback endpoint for Lahza payment redirects
      operationId: LahzaPaymentCallback
      parameters:
        - name: order_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Callback processed
          content:
            text/html:
              schema:
                type: string

