components:
  schemas:
    Order:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        user:
          type: string
          example: "507f1f77bcf86cd799439012"
        course:
          type: string
          nullable: true
          example: "507f1f77bcf86cd799439013"
        package:
          type: string
          nullable: true
        coursePackage:
          type: string
          nullable: true
        totalOrderPrice:
          type: number
          example: 99.99
        isPaid:
          type: boolean
          example: true
        paidAt:
          type: string
          format: date-time
          nullable: true
        paymentMethod:
          type: string
          example: "plisio"
        createdAt:
          type: string
          format: date-time
