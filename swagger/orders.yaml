# Orders endpoints documentation

paths:
  /orders:
    get:
      tags:
        - Orders
      summary: Get all orders
      description: Get list of orders with filtering (user sees their own, admin sees all)
      operationId: findAllOrders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          schema:
            type: integer
            example: 10
        - name: isPaid
          in: query
          schema:
            type: boolean
            example: true
        - name: sort
          in: query
          schema:
            type: string
            example: "-createdAt"
      responses:
        "200":
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  results:
                    type: integer
                    example: 100
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Get detailed information about a specific order
      operationId: findSpecificOrder
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/statistics:
    get:
      tags:
        - Orders
      summary: Get order statistics
      description: Get order statistics and analytics (admin only)
      operationId: getOrderStatistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Statistics retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      totalOrders:
                        type: integer
                        example: 1000
                      totalRevenue:
                        type: number
                        example: 50000.00
                      paidOrders:
                        type: integer
                        example: 800
                      unpaidOrders:
                        type: integer
                        example: 200

  /orders/byMonth:
    get:
      tags:
        - Orders
      summary: Get orders by month
      description: Get orders grouped by month (admin only)
      operationId: getOrdersByMonth
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: query
          schema:
            type: integer
            example: 2024
      responses:
        "200":
          description: Orders by month retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        month:
                          type: string
                          example: "2024-01"
                        count:
                          type: integer
                          example: 50
                        revenue:
                          type: number
                          example: 5000.00

  /orders/purchaseForUser:
    put:
      tags:
        - Orders
      summary: Purchase for user (Admin)
      description: Admin can purchase items on behalf of a user
      operationId: purchaseForUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - itemId
                - itemType
              properties:
                userId:
                  type: string
                  example: "507f1f77bcf86cd799439011"
                itemId:
                  type: string
                  example: "507f1f77bcf86cd799439012"
                itemType:
                  type: string
                  enum: [course, package, coursePackage]
                  example: "course"
                isPaid:
                  type: boolean
                  example: true
      responses:
        "200":
          description: Purchase completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/Order"

  /orders/createUnPaidOrder/{id}:
    put:
      tags:
        - Orders
      summary: Create unpaid order
      description: Create an unpaid order for free courses
      operationId: createUnPaidOrder
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Course/Package ID
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [course, package, coursePackage]
                  example: "course"
      responses:
        "200":
          description: Unpaid order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    $ref: "#/components/schemas/Order"

  /orders/plisio/courseCheckout/{courseId}:
    put:
      tags:
        - Orders
      summary: Plisio course checkout
      description: Create checkout session for course payment via Plisio
      operationId: courseCheckoutSessionPlisio
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  checkoutUrl:
                    type: string
                    example: "https://plisio.net/checkout/abc123"

