# Notifications endpoints documentation

paths:
  /notifications:
    get:
      tags:
        - Notifications
      summary: Get my notifications
      description: Get list of notifications for the logged-in user
      operationId: getMyNotifications
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          schema:
            type: integer
            example: 10
        - name: sort
          in: query
          schema:
            type: string
            example: "-createdAt"
      responses:
        "200":
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  results:
                    type: integer
                    example: 10
                  pagination:
                    type: object
                    properties:
                      currentPage:
                        type: integer
                        example: 1
                      totalPages:
                        type: integer
                        example: 5
                      limit:
                        type: integer
                        example: 10
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Notifications
      summary: Send system notification to specific users
      description: Send a system notification to one or more users (admin only)
      operationId: sendSystemNotificationToUsers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - users
                - message
              properties:
                users:
                  type: array
                  description: Array of user IDs to send notification to
                  items:
                    type: string
                  example: ["507f1f77bcf86cd799439011", "507f1f77bcf86cd799439012"]
                message:
                  type: object
                  description: Localized message content
                  properties:
                    ar:
                      type: string
                      example: "رسالة إشعار النظام"
                    en:
                      type: string
                      example: "System notification message"
      responses:
        "201":
          description: Notifications sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Notifications sent successfully"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Notifications
      summary: Read all notifications
      description: Mark all notifications as read for the logged-in user
      operationId: readAllNotifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All notifications marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "All notification read"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/{id}:
    put:
      tags:
        - Notifications
      summary: Read notification
      description: Mark a specific notification as read
      operationId: readNotification
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Notification ID
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "notification read"
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Notifications
      summary: Delete notification
      description: Delete a specific notification
      operationId: deleteNotification
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Notification ID
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "204":
          description: Notification deleted successfully
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/unreadCount:
    get:
      tags:
        - Notifications
      summary: Get unread notification count
      description: Get the count of unread notifications for the logged-in user
      operationId: getUnreadNotificationCount
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unread count retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    example: 5
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/systemNotificationToAll:
    post:
      tags:
        - Notifications
      summary: Send system notification to all users
      description: Send a system notification to all users with role 'user' (admin only). This also sends push notifications to mobile devices.
      operationId: sendSystemNotificationToAll
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: object
                  description: Localized message content
                  properties:
                    ar:
                      type: string
                      example: "إشعار للجميع"
                    en:
                      type: string
                      example: "Notification to all users"
      responses:
        "201":
          description: Notifications sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Notifications sent successfully"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/pushOnly:
    post:
      tags:
        - Notifications
      summary: Send push notification only
      description: |
        Send a push notification without saving to database (admin only).
        Useful for marketing/broadcast notifications.
        Can send to specific users, all users, or a topic.
      operationId: sendPushNotificationOnly
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - body
              properties:
                title:
                  type: string
                  description: Push notification title
                  example: "New Course Available!"
                body:
                  type: string
                  description: Push notification body text
                  example: "Check out our latest course on AI Development"
                userIds:
                  type: array
                  description: Array of user IDs to send push notification to (use this OR sendToAll OR topic)
                  items:
                    type: string
                  example: ["507f1f77bcf86cd799439011", "507f1f77bcf86cd799439012"]
                sendToAll:
                  type: boolean
                  description: Send push notification to all users with FCM tokens
                  example: true
                topic:
                  type: string
                  description: FCM topic name to send push notification to (users must be subscribed to this topic)
                  example: "new_courses"
      responses:
        "200":
          description: Push notification sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Push notification sent"
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      totalSuccess:
                        type: integer
                        example: 150
                      totalFailure:
                        type: integer
                        example: 5
        "400":
          description: Bad request - Missing required fields or no FCM tokens found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    Notification:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        user:
          type: object
          properties:
            _id:
              type: string
              example: "507f1f77bcf86cd799439012"
            name:
              type: string
              example: "John Doe"
            email:
              type: string
              example: "john@example.com"
            profileImg:
              type: string
              example: "https://example.com/users/profile.jpg"
        post:
          type: object
          nullable: true
          description: Post reference (when type is 'post')
          properties:
            _id:
              type: string
              example: "507f1f77bcf86cd799439013"
            content:
              type: string
              example: "Post content here..."
        chat:
          type: object
          nullable: true
          description: Chat reference (when type is 'chat')
          properties:
            _id:
              type: string
              example: "507f1f77bcf86cd799439014"
        course:
          type: object
          nullable: true
          description: Course reference (when type is 'certificate')
          properties:
            _id:
              type: string
              example: "507f1f77bcf86cd799439015"
        followedUser:
          type: object
          nullable: true
          description: Followed user reference (when type is 'follow')
          properties:
            _id:
              type: string
              example: "507f1f77bcf86cd799439016"
            name:
              type: string
              example: "Jane Doe"
            email:
              type: string
              example: "jane@example.com"
            profileImg:
              type: string
              example: "https://example.com/users/profile.jpg"
        message:
          type: string
          description: Localized notification message
          example: "You have a new follower!"
        file:
          type: string
          nullable: true
          description: File URL (for order or certificate notifications)
          example: "https://example.com/certificate/cert123.pdf"
        read:
          type: boolean
          description: Whether the notification has been read
          example: false
        type:
          type: string
          enum: [system, post, chat, certificate, follow, order]
          description: Type of notification
          example: "system"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"

