# This file is merged with the main OpenAPI specification
# Only paths and additional components are defined here

paths:
  /instructorProfits/courseAnalytics/{itemId}:
    get:
      tags:
        - Instructor Profits
      summary: Get course analytics with optional date filtering
      description: |
        Retrieves analytics for a specific course, package, or course package including:
        - Total sales
        - Total registered users
        - List of registered users with their details
        - Optional date filtering
      operationId: getCourseAnalytics
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          description: The ID of the course, package, or course package
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
        - name: type
          in: query
          required: true
          description: Type of item (course, package, or coursePackage)
          schema:
            type: string
            enum: [course, package, coursePackage]
            example: "course"
        - name: startDate
          in: query
          required: false
          description: Start date filter in DD/MM/YYYY format
          schema:
            type: string
            pattern: '^\d{2}/\d{2}/\d{4}$'
            example: "01/01/2024"
        - name: endDate
          in: query
          required: false
          description: End date filter in DD/MM/YYYY format
          schema:
            type: string
            pattern: '^\d{2}/\d{2}/\d{4}$'
            example: "31/12/2024"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  item:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "507f1f77bcf86cd799439011"
                      title:
                        type: string
                        example: "Introduction to JavaScript"
                      price:
                        type: number
                        example: 99.99
                      instructor:
                        type: string
                        example: "507f1f77bcf86cd799439012"
                  totalSales:
                    type: number
                    example: 9999.99
                  totalRegisteredUsers:
                    type: integer
                    example: 150
                  registeredUsers:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          example: "507f1f77bcf86cd799439013"
                        name:
                          type: string
                          example: "John Doe"
                        email:
                          type: string
                          example: "john@example.com"
                        profileImg:
                          type: string
                          example: "https://example.com/profile.jpg"
                        isResale:
                          type: boolean
                          example: false
                        paidAt:
                          type: string
                          format: date-time
                        createdAt:
                          type: string
                          format: date-time
                  filters:
                    type: object
                    properties:
                      startDate:
                        type: string
                        nullable: true
                        example: "01/01/2024"
                      endDate:
                        type: string
                        nullable: true
                        example: "31/12/2024"
        "400":
          description: Bad request - Missing or invalid type parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /instructorProfits/total/{id}:
    get:
      tags:
        - Instructor Profits
      summary: Get total sales analytics
      description: |
        Retrieves total sales analytics for an instructor including:
        - Total sales amount
        - Current month registrations
        - Analytics breakdown by item type
        - Optional month filter (yyyy-mm format)
      operationId: getTotalSalesAnalytics
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: false
          description: Instructor ID (optional, defaults to authenticated user)
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
        - name: month
          in: query
          required: false
          description: Month filter in yyyy-mm format
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
            example: "2024-01"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  month:
                    type: string
                    nullable: true
                    example: "2024-01"
                  totalSales:
                    type: number
                    example: 50000.00
                  currentMonthRegistrations:
                    type: integer
                    example: 25
                  analytics:
                    type: object
                    description: Analytics breakdown by item type
                    additionalProperties:
                      type: object
                      properties:
                        totalSales:
                          type: number
                        percentage:
                          type: number
                        count:
                          type: integer
        "400":
          description: Bad request - Invalid month format or no orders found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No orders found for this instructor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /instructorProfits/instructorAnalytics/{id}:
    get:
      tags:
        - Instructor Profits
      summary: Get instructor analytics
      description: |
        Retrieves comprehensive analytics for an instructor including:
        - Total enrollments
        - Average rating
        - Instructor profits
        - Withdrawals
        - Total sales money
        - Commissions history
        - Invoices
      operationId: getInstructorAnalytics
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: false
          description: Instructor ID (optional, defaults to authenticated user)
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  totalEnrollments:
                    type: integer
                    example: 500
                  totalEnrollmentsDiff:
                    type: number
                    example: 32
                  avgRate:
                    type: number
                    example: 4.5
                  avgRateDiff:
                    type: number
                    example: 1.3
                  instructorProfits:
                    type: number
                    example: 15000.00
                  instructorProfitsDiff:
                    type: number
                    example: 300
                  withdrawals:
                    type: number
                    example: 5000.00
                  totalSalesMoney:
                    type: number
                    example: 100000.00
                  commissions:
                    type: array
                    items:
                      type: object
                      properties:
                        order:
                          type: string
                          example: "507f1f77bcf86cd799439014"
                        type:
                          type: string
                          example: "course"
                        amount:
                          type: number
                          example: 99.99
                        percentage:
                          type: number
                          example: 70
                        totalProfits:
                          type: number
                          example: 69.99
                        profit:
                          type: number
                          example: 69.99
                        marketer:
                          type: string
                          nullable: true
                          example: "507f1f77bcf86cd799439015"
                        marketerPercentage:
                          type: number
                          example: 10
                        marketerProfits:
                          type: number
                          example: 9.99
                        createdAt:
                          type: string
                          format: date-time
                  invoices:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          example: "507f1f77bcf86cd799439016"
                        profits:
                          type: number
                          example: 5000.00
                        desc:
                          type: string
                          example: "Invoice for period : January 1 (Monday) to January 31 (Wednesday)"
                        status:
                          type: string
                          enum: [unpaid, paid]
                          example: "unpaid"
                        createdAt:
                          type: string
                          format: date-time
                        paidAt:
                          type: string
                          format: date-time
                          nullable: true
        "404":
          description: InstructorProfits document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /instructorProfits/salesAnalytics/{id}:
    get:
      tags:
        - Instructor Profits
      summary: Get sales analytics by item
      description: |
        Retrieves sales analytics broken down by individual items (courses, packages, course packages) including:
        - Sales per item
        - Order counts per item
        - Percentage of total sales for each item
        - Sorted by percentage in descending order
      operationId: getSalesAnalytics
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: false
          description: Instructor ID (optional, defaults to authenticated user)
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  sales:
                    type: array
                    items:
                      type: object
                      properties:
                        itemId:
                          type: string
                          example: "507f1f77bcf86cd799439011"
                        itemType:
                          type: string
                          enum: [course, package, coursePackage]
                          example: "course"
                        itemTitle:
                          type: string
                          example: "Introduction to JavaScript"
                        totalSalesMoney:
                          type: number
                          example: 9999.99
                        ordersCount:
                          type: integer
                          example: 100
                        percentageOfTotalSales:
                          type: number
                          format: float
                          example: 45.5
                  totalSalesMoney:
                    type: number
                    example: 50000.00
                  totalOrders:
                    type: integer
                    example: 500
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
